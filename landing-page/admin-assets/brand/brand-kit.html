<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyTradeSetup — Brand Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #05070F;
    --s1: #0E1530;
    --s2: #0a1224;
    --blue: #2B7BFF;
    --cyan: #22D3EE;
    --gold: #F0C05A;
    --violet: #8B5CF6;
    --lime: #8FCC2A;
    --amber: #FFB341;
    --green: #22C55E;
    --red: #FF4D4F;
    --ink: rgba(255,255,255,0.92);
    --ink60: rgba(255,255,255,0.60);
    --ink40: rgba(255,255,255,0.40);
    --ink10: rgba(255,255,255,0.10);
    --ink06: rgba(255,255,255,0.06);
    --grad: linear-gradient(135deg, #2B7BFF 0%, #22D3EE 60%, #F0C05A 100%);
    --grad-mark: linear-gradient(135deg, #2B7BFF, #22D3EE);
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter Tight', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --sidebar: 220px;
    --radius: 12px;
    --radius-sm: 8px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-body); }
  #root { height: 100%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink10); border-radius: 4px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #000; font-family: var(--font-mono); font-size: 13px;
    font-weight: 500; padding: 8px 20px; border-radius: 40px; z-index: 9999;
    opacity: 0; transition: all 0.25s ease; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast">Copied!</div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">

// ─── Tokens ───────────────────────────────────────────────────────────────────
const TOKENS = {
  colors: {
    bg: [
      { name: 'Page BG', hex: '#05070F', role: 'Full-bleed page, banners, ad creatives' },
      { name: 'Surface 1', hex: '#0E1530', role: 'Cards, panels, second layer' },
      { name: 'Surface 2', hex: '#0a1224', role: 'Tertiary depth (rare)' },
    ],
    accents: [
      { name: 'Electric Blue', hex: '#2B7BFF', role: 'Primary brand. Buttons, links, accents.' },
      { name: 'Cyan', hex: '#22D3EE', role: 'Secondary accent. Pairs with blue in gradients.' },
      { name: 'Brand Gold', hex: '#F0C05A', role: 'CTAs, price badges, "Free" tags.' },
      { name: 'Violet', hex: '#8B5CF6', role: 'Tertiary — use sparingly, never alone.' },
      { name: 'Acid Lime', hex: '#8FCC2A', role: '"Live", "Free", signal-active states only.' },
      { name: 'Amber', hex: '#FFB341', role: 'Warnings, "Inaugural offer" eyebrow text.' },
    ],
    semantic: [
      { name: 'Up / Win', hex: '#22C55E', role: 'Bullish, profit, positive signals' },
      { name: 'Down / Loss', hex: '#FF4D4F', role: 'Bearish, drawdown, negative signals' },
    ],
    ink: [
      { name: 'Ink', hex: 'rgba(255,255,255,0.92)', role: 'Primary white text' },
      { name: 'Ink-60', hex: 'rgba(255,255,255,0.60)', role: 'Subheadings, secondary text' },
      { name: 'Ink-40', hex: 'rgba(255,255,255,0.40)', role: 'Captions, tertiary text' },
    ]
  },
  type: [
    { name: 'Space Grotesk', role: 'Display / Headlines', weights: '500 / 600 / 700', usage: 'H1, H2, big numbers, banner headlines', sample: 'One indicator. Lifetime.', size: '40px', weight: 700 },
    { name: 'Inter Tight', role: 'Body / UI', weights: '400 / 500 / 600 / 700', usage: 'Paragraphs, buttons, nav, UI labels', sample: 'Educational. You decide every trade.', size: '18px', weight: 400 },
    { name: 'JetBrains Mono', role: 'Mono / Data', weights: '400 / 500 / 700', usage: 'Prices, ticker symbols, code, eyebrow labels', sample: 'EASYTRADESETUP · PINE V5', size: '14px', weight: 500 },
  ]
};

const SOCIAL_ASSETS = [
  { id: 'yt-banner', label: 'YouTube Banner', w: 2560, h: 1440, safe: '1546×423' },
  { id: 'yt-profile', label: 'YouTube Profile', w: 800, h: 800 },
  { id: 'yt-endscreen', label: 'End Screen', w: 1920, h: 1080 },
  { id: 'ig-profile', label: 'IG Profile', w: 1024, h: 1024 },
  { id: 'ig-carousel', label: 'IG Carousel', w: 1080, h: 1350 },
  { id: 'ig-reel', label: 'IG Reel Cover', w: 1080, h: 1920 },
  { id: 'ig-story', label: 'IG Story', w: 1080, h: 1920 },
  { id: 'wordmark-h', label: 'Wordmark H', w: 1200, h: 300 },
  { id: 'wordmark-s', label: 'Wordmark Stacked', w: 600, h: 600 },
  { id: 'email-sig', label: 'Email Signature', w: 600, h: 150 },
];

// ─── Utilities ─────────────────────────────────────────────────────────────────
function showToast(msg = 'Copied!') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function copyHex(hex) {
  navigator.clipboard.writeText(hex).catch(() => {});
  showToast(`Copied ${hex}`);
}

// ─── Brand Mark SVG ────────────────────────────────────────────────────────────
function BrandMark({ size = 48 }) {
  const id = `bm-${size}`;
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop stopColor="#2B7BFF"/>
          <stop offset="1" stopColor="#22D3EE"/>
        </linearGradient>
      </defs>
      <circle cx="24" cy="24" r="24" fill={`url(#${id})`}/>
      <polyline points="13,24 21,32 35,16" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
    </svg>
  );
}

// ─── GradientText ──────────────────────────────────────────────────────────────
function GradText({ children, style = {} }) {
  return (
    <span style={{
      background: 'linear-gradient(135deg, #2B7BFF 0%, #22D3EE 60%, #F0C05A 100%)',
      WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
      backgroundClip: 'text', ...style
    }}>{children}</span>
  );
}

// ─── Layout Shell ─────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: 'overview', label: 'Overview', icon: '◈' },
  { id: 'colors', label: 'Colors', icon: '◉' },
  { id: 'typography', label: 'Typography', icon: 'Aa' },
  { id: 'logo', label: 'Logo & Mark', icon: '◎' },
  { id: 'gradient', label: 'Gradient', icon: '◐' },
  { id: 'social', label: 'Social Assets', icon: '⊞' },
  { id: 'templates', label: 'Templates', icon: '▤' },
  { id: 'ytshorts', label: 'YouTube Shorts', icon: '▶' },
  { id: 'igreels', label: 'Instagram Reels', icon: '◑' },
  { id: 'voice', label: 'Voice & Copy', icon: '✦' },
  { id: 'checklist', label: 'Checklist', icon: '✓' },
];

function Sidebar({ active, setActive, collapsed }) {
  return (
    <nav style={{
      width: collapsed ? 56 : 220, minWidth: collapsed ? 56 : 220,
      background: '#070B1A', borderRight: '1px solid rgba(255,255,255,0.06)',
      display: 'flex', flexDirection: 'column', padding: '24px 0', transition: 'width 0.2s',
      overflow: 'hidden', zIndex: 10, position: 'relative', flexShrink: 0,
    }}>
      {/* Logo */}
      <div style={{ padding: collapsed ? '0 0 24px 8px' : '0 20px 28px', display: 'flex', alignItems: 'center', gap: 10 }}>
        <BrandMark size={32}/>
        {!collapsed && (
          <div>
            <div style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 14, color: 'rgba(255,255,255,0.92)', lineHeight: 1.2 }}>EasyTradeSetup</div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, color: 'rgba(255,255,255,0.4)', letterSpacing: '0.12em', marginTop: 2 }}>BRAND KIT</div>
          </div>
        )}
      </div>

      <div style={{ height: 1, background: 'rgba(255,255,255,0.06)', margin: '0 16px 16px' }}/>

      {NAV_ITEMS.map(item => (
        <button key={item.id} onClick={() => setActive(item.id)} style={{
          display: 'flex', alignItems: 'center', gap: 10,
          padding: collapsed ? '10px 0' : '10px 20px',
          justifyContent: collapsed ? 'center' : 'flex-start',
          background: active === item.id ? 'rgba(43,123,255,0.12)' : 'transparent',
          borderLeft: active === item.id ? '2px solid #2B7BFF' : '2px solid transparent',
          border: 'none', borderLeft: active === item.id ? '2px solid #2B7BFF' : '2px solid transparent',
          cursor: 'pointer', color: active === item.id ? 'rgba(255,255,255,0.92)' : 'rgba(255,255,255,0.45)',
          fontFamily: 'Inter Tight', fontSize: 13, fontWeight: active === item.id ? 600 : 400,
          transition: 'all 0.15s', width: '100%', textAlign: 'left',
          borderRadius: 0,
        }}>
          <span style={{ fontSize: 14, flexShrink: 0, width: 18, textAlign: 'center', fontFamily: 'monospace' }}>{item.icon}</span>
          {!collapsed && <span>{item.label}</span>}
        </button>
      ))}

      <div style={{ flex: 1 }}/>
      <div style={{ padding: collapsed ? '0' : '16px 20px', textAlign: collapsed ? 'center' : 'left' }}>
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 9, color: 'rgba(255,255,255,0.25)', letterSpacing: '0.1em' }}>
          {collapsed ? 'v1' : 'v1.0 · May 2026'}
        </div>
      </div>
    </nav>
  );
}

// ─── Color Swatch ──────────────────────────────────────────────────────────────
function Swatch({ name, hex, role, size = 'md' }) {
  const isRgba = hex.startsWith('rgba');
  const displayBg = isRgba ? `linear-gradient(135deg, #ffffff22, #ffffff44)` : hex;

  return (
    <div
      onClick={() => copyHex(hex)}
      title={`Click to copy ${hex}`}
      style={{
        cursor: 'pointer', border: '1px solid rgba(255,255,255,0.08)',
        borderRadius: 10, overflow: 'hidden', transition: 'transform 0.15s, border-color 0.15s',
        background: '#0E1530',
      }}
      onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(43,123,255,0.4)'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(255,255,255,0.08)'; e.currentTarget.style.transform = 'none'; }}
    >
      <div style={{
        height: size === 'lg' ? 80 : 56,
        background: isRgba ? '#1a1a2e' : hex,
        position: 'relative',
      }}>
        {isRgba && (
          <div style={{
            position: 'absolute', inset: 0,
            background: hex,
            backdropFilter: 'blur(0)',
          }}/>
        )}
        <div style={{
          position: 'absolute', top: 6, right: 6,
          background: 'rgba(0,0,0,0.4)', borderRadius: 4,
          padding: '2px 6px', fontFamily: 'JetBrains Mono', fontSize: 9,
          color: 'rgba(255,255,255,0.7)', letterSpacing: '0.05em'
        }}>COPY</div>
      </div>
      <div style={{ padding: '10px 12px' }}>
        <div style={{ fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 13, color: 'rgba(255,255,255,0.92)', marginBottom: 2 }}>{name}</div>
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'rgba(255,255,255,0.5)', marginBottom: 4 }}>{hex}</div>
        {role && <div style={{ fontFamily: 'Inter Tight', fontSize: 11, color: 'rgba(255,255,255,0.35)', lineHeight: 1.4 }}>{role}</div>}
      </div>
    </div>
  );
}

// ─── Section Header ────────────────────────────────────────────────────────────
function SectionHeader({ eyebrow, title, subtitle }) {
  return (
    <div style={{ marginBottom: 36 }}>
      {eyebrow && (
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, fontWeight: 500, letterSpacing: '0.16em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 8 }}>
          {eyebrow}
        </div>
      )}
      <h2 style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 28, color: 'rgba(255,255,255,0.92)', marginBottom: subtitle ? 10 : 0 }}>
        {title}
      </h2>
      {subtitle && <p style={{ fontFamily: 'Inter Tight', fontSize: 15, color: 'rgba(255,255,255,0.55)', lineHeight: 1.6, maxWidth: 600 }}>{subtitle}</p>}
    </div>
  );
}

// ─── Card wrapper ──────────────────────────────────────────────────────────────
function Card({ children, style = {} }) {
  return (
    <div style={{
      background: '#0E1530', border: '1px solid rgba(255,255,255,0.07)',
      borderRadius: 12, padding: 24, ...style
    }}>{children}</div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECTION: OVERVIEW
// ═══════════════════════════════════════════════════════════════════════════════
function OverviewSection() {
  return (
    <div>
      {/* Hero */}
      <div style={{
        background: 'linear-gradient(135deg, #0E1530 0%, #05070F 100%)',
        border: '1px solid rgba(255,255,255,0.07)', borderRadius: 16,
        padding: '60px 48px', marginBottom: 32, position: 'relative', overflow: 'hidden',
      }}>
        {/* Glow */}
        <div style={{
          position: 'absolute', top: -80, left: -80, width: 400, height: 400,
          background: 'radial-gradient(circle, rgba(43,123,255,0.15) 0%, transparent 70%)',
          pointerEvents: 'none',
        }}/>
        <div style={{
          position: 'absolute', bottom: -60, right: -60, width: 300, height: 300,
          background: 'radial-gradient(circle, rgba(34,211,238,0.08) 0%, transparent 70%)',
          pointerEvents: 'none',
        }}/>

        <div style={{ display: 'flex', alignItems: 'center', gap: 20, marginBottom: 24 }}>
          <BrandMark size={56}/>
          <div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '0.16em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 4 }}>Brand Kit · v1.0</div>
            <h1 style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: 36, lineHeight: 1.1, color: 'rgba(255,255,255,0.92)' }}>
              <GradText>EasyTradeSetup</GradText>
            </h1>
          </div>
        </div>

        <p style={{ fontFamily: 'Inter Tight', fontSize: 16, color: 'rgba(255,255,255,0.6)', lineHeight: 1.6, maxWidth: 540, marginBottom: 28 }}>
          Single source of truth for every off-platform surface — YouTube, Instagram, Linktree, ad creatives, slide decks, PDF covers.
        </p>

        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
          {[
            { label: 'Tagline', val: 'One indicator. Lifetime.' },
            { label: 'Domain', val: 'easytradesetup.com' },
            { label: 'Platform', val: 'TradingView Pine v5' },
          ].map(({ label, val }) => (
            <div key={label} style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 8, padding: '8px 16px' }}>
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'rgba(255,255,255,0.4)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>{label}: </span>
              <span style={{ fontFamily: 'Inter Tight', fontSize: 13, fontWeight: 500, color: 'rgba(255,255,255,0.85)' }}>{val}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Quick stats grid */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 16, marginBottom: 32 }}>
        {[
          { num: '6', label: 'Brand Colors' },
          { num: '3', label: 'Typefaces' },
          { num: '10', label: 'Social Assets' },
          { num: '1', label: 'Signature Gradient' },
        ].map(({ num, label }) => (
          <Card key={label} style={{ textAlign: 'center', padding: '20px 16px' }}>
            <div style={{ fontFamily: 'JetBrains Mono', fontWeight: 700, fontSize: 32, color: '#2B7BFF', marginBottom: 4 }}>{num}</div>
            <div style={{ fontFamily: 'Inter Tight', fontSize: 13, color: 'rgba(255,255,255,0.5)' }}>{label}</div>
          </Card>
        ))}
      </div>

      {/* Handles */}
      <Card>
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '0.14em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 16 }}>Names & Handles</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 12 }}>
          {[
            { surface: 'YouTube', val: '@easytradesetups' },
            { surface: 'Instagram', val: '@easytradesetup' },
            { surface: 'GitHub', val: 'quantsentra/easytradesetup' },
            { surface: 'Email', val: 'welcome@easytradesetup.com' },
            { surface: 'Domain', val: 'easytradesetup.com' },
            { surface: 'Tagline', val: 'One indicator. Lifetime.' },
          ].map(({ surface, val }) => (
            <div key={surface} onClick={() => copyHex(val)} style={{
              display: 'flex', flexDirection: 'column', gap: 2, cursor: 'pointer',
              padding: '10px 12px', borderRadius: 8, background: 'rgba(255,255,255,0.03)',
              border: '1px solid rgba(255,255,255,0.06)', transition: 'border-color 0.15s',
            }}
              onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(43,123,255,0.3)'}
              onMouseLeave={e => e.currentTarget.style.borderColor = 'rgba(255,255,255,0.06)'}
            >
              <span style={{ fontFamily: 'JetBrains Mono', fontSize: 9, letterSpacing: '0.12em', color: 'rgba(255,255,255,0.35)', textTransform: 'uppercase' }}>{surface}</span>
              <span style={{ fontFamily: 'Inter Tight', fontSize: 13, fontWeight: 500, color: 'rgba(255,255,255,0.8)' }}>{val}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// SECTION: COLORS
// ═══════════════════════════════════════════════════════════════════════════════
function ColorsSection() {
  return (
    <div>
      <SectionHeader eyebrow="01 — Color System" title="Color Palette" subtitle="Click any swatch to copy its hex value. Dark mode is the canonical surface for all EasyTradeSetup assets." />

      {[
        { label: 'Backgrounds', items: TOKENS.colors.bg },
        { label: 'Brand Accents', items: TOKENS.colors.accents },
        { label: 'Trading Semantic', items: TOKENS.colors.semantic },
        { label: 'Ink / Text', items: TOKENS.colors.ink },
      ].map(({ label, items }) => (
        <div key={label} style={{ marginBottom: 36 }}>
          <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '0.14em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 14 }}>{label}</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(170px, 1fr))', gap: 14 }}>
            {items.map(c => <Swatch key={c.name} {...c} />)}
          </div>
        </div>
      ))}

      {/* Signature Gradient */}
      <div style={{ marginBottom: 36 }}>
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '0.14em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 14 }}>Signature Gradient</div>
        <Card style={{ overflow: 'hidden', padding: 0 }}>
          <div style={{ height: 80, background: 'linear-gradient(135deg, #2B7BFF 0%, #22D3EE 60%, #F0C05A 100%)' }}/>
          <div style={{ padding: '16px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
            <div>
              <div style={{ fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 14, marginBottom: 4 }}>Signature Gradient</div>
              <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: 'rgba(255,255,255,0.5)' }}>linear-gradient(135deg, #2B7BFF 0%, #22D3EE 60%, #F0C05A 100%)</div>
            </div>
            <button onClick={() => copyHex('linear-gradient(135deg, #2B7BFF 0%, #22D3EE 60%, #F0C05A 100%)')} style={{
              background: 'rgba(43,123,255,0.15)', border: '1px solid rgba(43,123,255,0.3)',
              color: '#2B7BFF', fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '0.1em',
              padding: '7px 16px', borderRadius: 6, cursor: 'pointer', textTransform: 'uppercase',
            }}>Copy CSS</button>
          </div>
        </Card>
      </div>

      {/* Usage rules */}
      <Card>
        <div style={{ fontFamily: 'JetBrains Mono', fontSize: 11, letterSpacing: '0.14em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase', marginBottom: 16 }}>Usage Rules</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {[
            { rule: 'Lead with Electric Blue', note: '#2B7BFF — primary CTA, links, active states' },
            { rule: 'Gold for high-value CTAs', note: '"Buy Now", price badges, "Free" tags only' },
            { rule: 'One gradient per asset', note: 'Never compete signature gradient with itself' },
            { rule: 'Lime for live signals only', note: 'Never use #8FCC2A in body text or headings' },
          ].map(({ rule, note }) => (
            <div key={rule} style={{ padding: '12px 14px', background: 'rgba(255,255,255,0.03)', borderRadius: 8, border: '1px solid rgba(255,255,255,0.06)' }}>

// ─── Download Utility ─────────────────────────────────────────────────────────
function downloadSVG(svgEl, filename) {
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svgEl);
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showToast('SVG downloaded!');
}

function downloadCanvasAsPNG(drawFn, w, h, filename) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  drawFn(ctx, w, h);
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    showToast('PNG downloaded!');
  });
}

function drawBrandMarkCanvas(ctx, w, h) {
  const cx = w / 2, cy = h / 2, r = Math.min(w, h) * 0.45;
  const grad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
  grad.addColorStop(0, '#2B7BFF');
  grad.addColorStop(1, '#22D3EE');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  // Checkmark
  const s = r * 0.55;
  ctx.beginPath();
  ctx.moveTo(cx - s * 0.55, cy);
  ctx.lineTo(cx - s * 0.05, cy + s * 0.5);
  ctx.lineTo(cx + s * 0.65, cy - s * 0.5);
  ctx.strokeStyle = 'white';
  ctx.lineWidth = r * 0.14;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function drawWordmarkH(ctx, w, h) {
  ctx.fillStyle = '#05070F';
  ctx.fillRect(0, 0, w, h);
  drawBrandMarkCanvas(ctx, h * 0.7, h, );
  // shift mark left
  const markSize = h * 0.62;
  const markX = h * 0.19, markY = (h - markSize) / 2;
  const grad = ctx.createLinearGradient(markX, markY, markX + markSize, markY + markSize);
  grad.addColorStop(0, '#2B7BFF'); grad.addColorStop(1, '#22D3EE');
  ctx.beginPath();
  ctx.arc(markX + markSize / 2, markY + markSize / 2, markSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();
  const r = markSize / 2, cx2 = markX + markSize / 2, cy2 = markY + markSize / 2;
  ctx.beginPath();
  ctx.moveTo(cx2 - r * 0.55, cy2); ctx.lineTo(cx2 - r * 0.05, cy2 + r * 0.5); ctx.lineTo(cx2 + r * 0.65, cy2 - r * 0.5);
  ctx.strokeStyle = 'white'; ctx.lineWidth = r * 0.14; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.font = `700 ${h * 0.28}px "Space Grotesk", sans-serif`;
  ctx.textBaseline = 'middle';
  ctx.fillText('EasyTradeSetup', markX + markSize + h * 0.08, h / 2);
}

function IGReelChecklist() {
  const items = [
    'Video is 9:16, 1080×1920 px',
    'Duration is under 90s (ideally 15–30s)',
    'Cover frame designed for 9:16 full view',
    'Cover also works as 1:1 center square grid crop',
    'Brand mark top-left, max 28px, on all frames',
    'Gradient scrim on bottom 22% for metadata legibility',
    'Gradient stripe top 4px on cover frame',
    'No text in bottom 22% (overlapped by IG UI)',
    'No text in right 18% (overlapped by action rail)',
    'Hook is one sentence, max 7 words',
    'Caption starts with hook restatement',
    '"Educational. You decide every trade." in caption',
    'easytradesetup.com in caption',
    'Brand hashtags included (#EasyTradeSetup, #EasyTradeSetups)',
    'No guaranteed returns or performance claims anywhere',
    'Audio: either original or licensed track (not copyrighted)',
  ];
  const [checked, setChecked] = React.useState(() => items.map(() => false));
  const count = checked.filter(Boolean).length;
  const allDone = count === items.length;

  return (
    <div>
      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
          <span style={{ fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 14 }}>{count}/{items.length} complete</span>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => setChecked(items.map(() => true))} style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: '#22C55E', background: 'rgba(34,197,94,0.1)', border: '1px solid rgba(34,197,94,0.2)', borderRadius: 5, padding: '4px 10px', cursor: 'pointer' }}>CHECK ALL</button>
            <button onClick={() => setChecked(items.map(() => false))} style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'rgba(255,255,255,0.4)', background: 'transparent', border: '1px solid rgba(255,255,255,0.08)', borderRadius: 5, padding: '4px 10px', cursor: 'pointer' }}>RESET</button>
          </div>
        </div>
        <div style={{ height: 6, background: 'rgba(255,255,255,0.06)', borderRadius: 3, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${(count / items.length) * 100}%`, background: allDone ? '#22C55E' : 'linear-gradient(90deg, #22D3EE, #2B7BFF)', borderRadius: 3, transition: 'width 0.3s ease' }}/>
        </div>
      </Card>
      <Card>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {items.map((item, i) => (
            <div key={i} onClick={() => setChecked(prev => prev.map((v, j) => j === i ? !v : v))} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '11px 14px', borderRadius: 8, background: checked[i] ? 'rgba(34,197,94,0.05)' : 'rgba(255,255,255,0.02)', cursor: 'pointer', transition: 'background 0.15s', border: '1px solid', borderColor: checked[i] ? 'rgba(34,197,94,0.15)' : 'rgba(255,255,255,0.04)' }}>
              <div style={{ width: 18, height: 18, borderRadius: 4, flexShrink: 0, border: '1.5px solid', borderColor: checked[i] ? '#22C55E' : 'rgba(255,255,255,0.2)', background: checked[i] ? '#22C55E' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.15s' }}>
                {checked[i] && <span style={{ color: '#000', fontSize: 10, fontWeight: 700 }}>✓</span>}
              </div>
              <span style={{ fontFamily: 'Inter Tight', fontSize: 13, color: checked[i] ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.8)', textDecoration: checked[i] ? 'line-through' : 'none' }}>{item}</span>
            </div>
          ))}
        </div>
        {allDone && <div style={{ marginTop: 14, padding: '12px 16px', background: 'rgba(34,197,94,0.1)', border: '1px solid rgba(34,197,94,0.2)', borderRadius: 8, display: 'flex', alignItems: 'center', gap: 10 }}><span>✓</span><span style={{ fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 14, color: '#22C55E' }}>Reel is ready to publish.</span></div>}
      </Card>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════
const SECTION_MAP = {
  overview: OverviewSection,
  colors: ColorsSection,
  typography: TypographySection,
  logo: LogoSection,
  gradient: GradientSection,
  social: SocialSection,
  templates: TemplatesSection,
  ytshorts: YTShortsSection,
  igreels: IGReelsSection,
  voice: VoiceSection,
  checklist: ChecklistSection,
};

function App() {

  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);

    "accentColor": "#2B7BFF",

    setActive(id);
    setMobileNavOpen(false);
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={active} setActive={handleSetActive} collapsed={sidebarCollapsed}/>

            <button onClick={() => setSidebarCollapsed(v => !v)} style={{
              background: 'transparent', border: 'none', color: 'rgba(255,255,255,0.4)',

              transition: 'color 0.15s',
            }}

              onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.4)'}

            <span style={{ fontFamily: 'JetBrains Mono', fontSize: 11, color: 'rgba(255,255,255,0.35)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
              {NAV_ITEMS.find(n => n.id === active)?.label || 'Brand Kit'}

          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: 10, color: 'rgba(255,255,255,0.3)', letterSpacing: '0.08em' }}>easytradesetup.com</div>
            <div style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.1)' }}/>
            <div style={{ display: 'flex', gap: 4 }}>
              {['#2B7BFF', '#22D3EE', '#F0C05A'].map(c => <div key={c} style={{ width: 10, height: 10, borderRadius: '50%', background: c }}/>)}

      <TweaksPanel title="Display Options">

          <TweakButton key={item.id} label={`→ ${item.label}`} onClick={() => setActive(item.id)} />

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
