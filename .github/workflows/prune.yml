name: prune-pageviews

# Daily prune of pageviews older than 90d. Calls /api/admin/pv-prune
# with a Bearer secret. Hosted on GitHub Actions free schedule
# (Vercel Hobby has 1 daily cron — keep it free for future use).
#
# Setup once:
#   1. In Vercel project env vars: PV_PRUNE_SECRET = <random 24+ chars>
#   2. In GitHub repo → Settings → Secrets and variables → Actions → New
#      repository secret: name=PV_PRUNE_SECRET, value=<same random string>
#
# Manual trigger: Actions → prune-pageviews → Run workflow.

on:
  schedule:
    - cron: '17 3 * * *'   # 03:17 UTC daily — off-peak everywhere
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call prune endpoint
        env:
          PV_PRUNE_SECRET: ${{ secrets.PV_PRUNE_SECRET }}
        run: |
          if [ -z "$PV_PRUNE_SECRET" ]; then
            echo "::error::PV_PRUNE_SECRET secret not set in repo settings"
            exit 1
          fi
          response=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $PV_PRUNE_SECRET" \
            -H "Content-Type: application/json" \
            "https://www.easytradesetup.com/api/admin/pv-prune")
          echo "$response"
          status=$(echo "$response" | grep -o "HTTP_STATUS:[0-9]*" | cut -d: -f2)
          if [ "$status" != "200" ]; then
            echo "::error::Prune call failed with HTTP $status"
            exit 1
          fi
